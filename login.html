<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHA — Agent Login</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235175f1' stroke-width='2'><rect x='3' y='11' width='18' height='11' rx='2'/><path d='M7 11V7a5 5 0 0 1 10 0v4'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Clerk SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(81,117,241,0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(34,197,94,0.06), transparent);
      pointer-events: none;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      position: relative;
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      margin: 0 auto 14px;
      display: block;
      object-fit: contain;
      background: #162436;
      padding: 6px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.2;
    }

    .login-sub {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input:focus {
      border-color: #5175f1;
      box-shadow: 0 0 0 3px rgba(81,117,241,0.12);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #5175f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn-login:hover { background: #3d5fd4; }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #dc2626;
      margin-top: 12px;
      display: none;
    }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #64748b;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: inherit;
      width: 100%;
    }
    .forgot-link:hover { color: #5175f1; }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.6;
    }

    .badge-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    .role-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-agent  { background: rgba(81,117,241,0.1);  color: #5175f1; }
    .badge-manager{ background: rgba(34,197,94,0.1);   color: #16a34a; }

    /* Loading overlay */
    #auth-loading {
      display: none;
      position: fixed;
      inset: 0;
      background: #0f172a;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #auth-loading.show { display: flex; }
    .spin {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #5175f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-label { font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>

  <!-- Loading overlay shown while checking existing session -->
  <div id="auth-loading" class="show">
    <div class="spin"></div>
    <div class="spin-label">Checking session...</div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <img src="./logo.png" alt="CHA" class="login-logo" />
      <div class="login-title">Central Health Advisors</div>
      <div class="login-sub">Sales Command Center</div>
    </div>

    <div class="badge-row">
      <span class="role-badge badge-agent">Agent</span>
      <span style="font-size:10px;color:#cbd5e1;">·</span>
      <span class="role-badge badge-manager">Manager</span>
      <span style="font-size:10px;color:#cbd5e1;">·</span>
      <span style="font-size:10px;color:#94a3b8;font-weight:600;">Authorized Access Only</span>
    </div>

    <div id="sign-in-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@centralhealth.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-login" id="login-btn" onclick="doSignIn()">Sign In →</button>
      <div class="error-msg" id="error-msg"></div>
      <button class="forgot-link" onclick="doForgotPassword()">Forgot password?</button>
    </div>

    <!-- Forgot password view (hidden by default) -->
    <div id="forgot-form" style="display:none;">
      <div style="font-size:14px;font-weight:600;color:#1e293b;margin-bottom:8px;">Reset Password</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:16px;">Enter your email and we'll send a reset link.</div>
      <div class="form-group">
        <label for="reset-email">Email Address</label>
        <input type="email" id="reset-email" placeholder="you@centralhealth.com" />
      </div>
      <button class="btn-login" onclick="doSendReset()">Send Reset Link</button>
      <div class="error-msg" id="reset-error"></div>
      <button class="forgot-link" onclick="showSignIn()">← Back to sign in</button>
    </div>

    <div class="footer-note">
      🔒 Secure login · CHA Internal Only<br/>
      Contact your manager to get access.
    </div>
  </div>

  <script>
    // ── CLERK AUTH LOGIC ─────────────────────────────────────────────────
    var PK = 'pk_test_d2hvbGUtdmlwZXItODkuY2xlcmsuYWNjb3VudHMuZGV2JA';
    var clerk;

    window.addEventListener('load', function() {
      if (!window.Clerk) {
        document.getElementById('auth-loading').classList.remove('show');
        showError('Could not load auth. Please refresh the page.');
        return;
      }
      clerk = new window.Clerk(PK);
      clerk.load().then(function() {
        if (clerk.user) {
          window.location.replace('/');
          return;
        }
        document.getElementById('auth-loading').classList.remove('show');
      }).catch(function(err) {
        document.getElementById('auth-loading').classList.remove('show');
        showError('Auth error: ' + (err && err.message ? err.message : 'Please refresh.'));
      });
    });

    function initClerk() {
      // legacy — no longer used
    }

    function doSignIn() {
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn      = document.getElementById('login-btn');

      if (!email || !password) { showError('Please enter your email and password.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Signing in...';
      hideError();

      clerk.signIn.create({ identifier: email, password: password })
        .then(function(result) {
          if (result.status === 'complete') {
            window.location.replace('/');
          } else {
            btn.disabled    = false;
            btn.textContent = 'Sign In →';
            showError('Sign-in incomplete. Contact your manager.');
          }
        })
        .catch(function(err) {
          btn.disabled    = false;
          btn.textContent = 'Sign In →';
          var msg = 'Invalid email or password. Please try again.';
          if (err.errors && err.errors[0]) {
            var code = err.errors[0].code || '';
            if (code === 'form_password_incorrect') msg = 'Incorrect password. Please try again.';
            else if (code === 'form_identifier_not_found') msg = 'No account found with that email. Contact your manager.';
            else if (code === 'too_many_requests') msg = 'Too many attempts. Please wait a few minutes and try again.';
            else msg = err.errors[0].long_message || err.errors[0].message || msg;
          }
          showError(msg);
        });
    }

    function doForgotPassword() {
      document.getElementById('sign-in-form').style.display = 'none';
      document.getElementById('forgot-form').style.display  = 'block';
    }

    function showSignIn() {
      document.getElementById('forgot-form').style.display  = 'none';
      document.getElementById('sign-in-form').style.display = 'block';
    }

    function doSendReset() {
      var email = document.getElementById('reset-email').value.trim();
      if (!email) { document.getElementById('reset-error').textContent = 'Enter your email.'; document.getElementById('reset-error').style.display = 'block'; return; }
      clerk.signIn.create({ strategy: 'reset_password_email_code', identifier: email })
        .then(function() {
          document.getElementById('forgot-form').innerHTML =
            '<div style="text-align:center;padding:20px 0;">' +
            '<div style="font-size:32px;margin-bottom:12px;">📧</div>' +
            '<div style="font-size:15px;font-weight:700;color:#1e293b;margin-bottom:8px;">Check your email</div>' +
            '<div style="font-size:13px;color:#64748b;">Password reset link sent to <strong>' + email + '</strong></div>' +
            '<button class="forgot-link" onclick="showSignIn()" style="margin-top:16px;">← Back to sign in</button>' +
            '</div>';
        })
        .catch(function(err) {
          var msg = err.errors && err.errors[0] ? err.errors[0].message : 'Could not send reset email.';
          document.getElementById('reset-error').textContent = msg;
          document.getElementById('reset-error').style.display = 'block';
        });
    }

    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent    = msg;
      el.style.display  = 'block';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var form = document.getElementById('sign-in-form');
        if (form && form.style.display !== 'none') doSignIn();
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CHA — Agent Login</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_d2hvbGUtdmlwZXItODkuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://whole-viper-89.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(81,117,241,0.15), transparent);
      pointer-events: none;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      z-index: 1;
    }
    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #162436;
      padding: 5px;
      object-fit: contain;
    }
    .brand-name { font-size: 16px; font-weight: 800; color: #fff; }
    .brand-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    #app { z-index: 1; width: 100%; max-width: 400px; }
    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #475569;
      text-align: center;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="brand">
    <img src="./logo.png" alt="CHA" />
    <div>
      <div class="brand-name">Central Health Advisors</div>
      <div class="brand-sub">Sales Command Center · Authorized Access Only</div>
    </div>
  </div>

  <div id="app"></div>

  <div class="footer">🔒 CHA Internal Only · Contact your manager to get access</div>

  <script>
    window.addEventListener('load', async function () {
      await Clerk.load();
      if (Clerk.isSignedIn) {
        window.location.replace('/');
        return;
      }
      document.getElementById('app').innerHTML = '<div id="sign-in"></div>';
      Clerk.mountSignIn(document.getElementById('sign-in'));
    });
  </script>
</body>
</html>

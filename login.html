<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CHA — Agent Login</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(81,117,241,0.15), transparent);
      pointer-events: none;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      z-index: 1;
    }
    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #162436;
      padding: 5px;
      object-fit: contain;
    }
    .brand-name { font-size: 16px; font-weight: 800; color: #fff; line-height: 1.2; }
    .brand-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    #clerk-sign-in { z-index: 1; width: 100%; max-width: 400px; }
    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #475569;
      text-align: center;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="brand">
    <img src="./logo.png" alt="CHA" />
    <div>
      <div class="brand-name">Central Health Advisors</div>
      <div class="brand-sub">Sales Command Center · Authorized Access Only</div>
    </div>
  </div>

  <div id="clerk-sign-in"></div>

  <div class="footer">🔒 CHA Internal Only · Contact your manager to get access</div>

  <script>
    var CLERK_PK = 'pk_test_d2hvbGUtdmlwZXItODkuY2xlcmsuYWNjb3VudHMuZGV2JA';
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js';
    s.onload = function() {
      var clerk = new window.Clerk(CLERK_PK);
      clerk.load().then(function() {
        if (clerk.user) {
          window.location.replace('/');
          return;
        }
        clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
          afterSignInUrl: '/',
          redirectUrl: '/'
        });
      }).catch(function(e) {
        console.error('[CHA] Clerk error:', e);
        document.getElementById('clerk-sign-in').innerHTML =
          '<div style="color:#f87171;background:#1e293b;border-radius:12px;padding:20px;font-size:13px;text-align:center;font-family:sans-serif;">Could not load login. Please refresh the page.</div>';
      });
    };
    s.onerror = function() {
      document.getElementById('clerk-sign-in').innerHTML =
        '<div style="color:#f87171;background:#1e293b;border-radius:12px;padding:20px;font-size:13px;text-align:center;font-family:sans-serif;">Cannot connect. Check internet and refresh.</div>';
    };
    document.head.appendChild(s);
  </script>
</body>
</html>

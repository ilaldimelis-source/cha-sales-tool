<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CHA — Agent Login</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script async crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_d2hvbGUtdmlwZXItODkuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js"
    type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(81,117,241,0.15), transparent);
      pointer-events: none;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      z-index: 1;
    }
    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #162436;
      padding: 5px;
      object-fit: contain;
    }
    .brand-name { font-size: 16px; font-weight: 800; color: #fff; line-height: 1.2; }
    .brand-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    #sign-in { z-index: 1; width: 100%; max-width: 400px; }
    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #475569;
      text-align: center;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="brand">
    <img src="./logo.png" alt="CHA" />
    <div>
      <div class="brand-name">Central Health Advisors</div>
      <div class="brand-sub">Sales Command Center · Authorized Access Only</div>
    </div>
  </div>

  <div id="sign-in"></div>

  <div class="footer">🔒 CHA Internal Only · Contact your manager to get access</div>

  <script>
    window.addEventListener('load', async function () {
      try {
        await Clerk.load();
        if (Clerk.user) {
          window.location.replace('/');
          return;
        }
        var signInDiv = document.getElementById('sign-in');
        if (signInDiv) {
          Clerk.mountSignIn(signInDiv, {
            afterSignInUrl: '/',
            afterSignUpUrl: '/',
            routing: 'hash'
          });
        } else {
          console.error('[CHA] sign-in div not found');
        }
      } catch(e) {
        console.error('[CHA] Clerk error:', e);
        var d = document.getElementById('sign-in');
        if (d) d.innerHTML = '<div style="color:#f87171;text-align:center;padding:20px;font-family:sans-serif;font-size:13px;">Login failed. Please refresh the page.</div>';
      }
    });
  </script>
</body>
</html>

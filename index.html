    <!-- CSS: external file for GitHub Pages, with inline fallback for local dev servers
     that serve .css as text/plain (which browsers reject). The sync XHR runs only
     if the <link> stylesheet has 0 rules after loading. -->
    <link rel="stylesheet" href="css/styles.css?v=1775582443698" id="mainCSS" />
    <link rel="stylesheet" href="css/sales-tracker.css?v=1" />
    <script>
      (function () {
        // Give the <link> a moment, then check. If it failed (0 rules), inject via XHR.
        var link = document.getElementById('mainCSS');
        function check() {
          try {
            if (
              link.sheet &&
              link.sheet.cssRules &&
              link.sheet.cssRules.length > 0
            )
              return; // CSS loaded fine
          } catch (e) {
            /* cross-origin or not ready */
          }
          // Fallback: fetch CSS as text and inject as <style>
          var x = new XMLHttpRequest();
          x.open('GET', 'css/styles.css', false);
          x.send();
          if (x.status === 200) {
            var s = document.createElement('style');
            s.textContent = x.responseText;
            document.head.appendChild(s);
          }
        }
        // Check after link fires load event (or immediately if already loaded)
        if (link.sheet) {
          check();
        } else {
          link.onload = check;
          link.onerror = check;
        }
      })();
    </script>

     1. utils.js     — icons, escHTML, search engine (no dependencies)

     9. compliance    — Compliance Hub tab
     10. policy-docs  — POLICY_DOCS (biggest file)
     11. myspace.js   — MINDSET + notes + saved scripts (My Space tab)
     12. app.js       — PAGE_CONFIG, showPage, initApp, CLOSEABLE, SW

     ══════════════════════════════════════════════════════ -->

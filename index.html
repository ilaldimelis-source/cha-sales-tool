      {title: 'Opening & Benefits', content: "✖ ( DO NOT ASK IF THEY ARE STILL THERE)\nAlright [Customer Name], I have some excellent news for you. Based on the information you provided, I was able to locate a plan for you through the Multiplan Network/FirstHealth Network. This plan offers fixed benefits for doctor visits, hospital care, and prescription savings. You have the flexibility to see any provider within the network, and there's no requirement for referrals to visit a specialist. Another key advantage is nationwide access—this coverage can be used anywhere the network is accepted. And most importantly, there is no deductible. Does everything sound clear so far?\n▶ ( Wait for Answer )\nGreat. Based on everything we've reviewed, the monthly rate for this plan comes out to $___. There is a one-time standard group association fee of $___ to activate your membership within the plan. That brings the total for the first month to $___, and then moving forward, your monthly cost is simply $___ thereafter. Now, assuming this plan meets your medical needs, would the initial first-month amount of $___ be affordable for you today?\n▶ ( Wait for answer )\nPerfect. What I'll do next is walk you through the full benefits of the program. If everything looks good to you, we'll move forward with submitting the application to the insurance company. During the verification process, you'll receive an email that includes an outline of your coverage along with digital insurance cards. Your physical cards will then arrive by mail within approximately one to three weeks. Okay?\n▶ ( Wait for answer )\nYou don't need referrals to see a specialist. When you visit a doctor, the bill is first reduced to the network's contracted rate, and then your doctor visit benefit is applied. So if a provider bills higher, the network adjusts it first, and your benefit helps cover the cost after that.\n▶ ( Wait for Answer )\nPeople like this plan because it's simple. Unlike traditional plans with deductibles and coinsurance, this plan has no deductible and pays defined benefit amounts toward covered services—so you know what the plan contributes and can plan your expenses more easily.\n✖ ( DO NOT WAIT - GO TO RX )"},

function switchLivTab(e, prefix, tab) {
  e.stopPropagation();
  var par = e.target.closest('.lrp') || document.getElementById('liveResult');
  par.querySelectorAll('.rtab').forEach(function(t){t.classList.remove('active');});
  par.querySelectorAll('.rpanel').forEach(function(p){p.classList.remove('active');});
  e.target.classList.add('active');
  var el = document.getElementById(prefix + '-' + tab);
  if (el) el.classList.add('active');
}

function expandSearchSynonyms(query) {
  var q = query.toLowerCase().trim();
  var terms = [q];
  if (SEARCH_SYNONYMS[q]) terms = terms.concat(SEARCH_SYNONYMS[q]);
  // Also expand individual words for multi-word queries
  var qWords = q.split(/\s+/).filter(function(w) { return w.length >= 3; });
  Object.keys(SEARCH_SYNONYMS).forEach(function(key) {
    // Exact key match on full query already handled above
    if (key === q) return;
    // Full query is a substring of the key, or key is substring of query
    if (key.includes(q)) {
      terms = terms.concat(SEARCH_SYNONYMS[key]);
    } else if (q.includes(key)) {
      // Key must appear as a whole word in query (not inside another word)
      var keyRe = new RegExp('(?:^|\\s)' + key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?:\\s|$)');
      if (keyRe.test(q)) terms = terms.concat(SEARCH_SYNONYMS[key]);
    }
    // Fuzzy match on full query
    if (q.length >= 4 && fuzzyMatch(q, key)) {
      terms = terms.concat(SEARCH_SYNONYMS[key]);
      terms.push(key);
    }
    // Fuzzy match on individual words (catches misspellings in multi-word queries)
    if (qWords.length > 1) {
      qWords.forEach(function(w) {
        if (w === key) { terms = terms.concat(SEARCH_SYNONYMS[key]); terms.push(key); }
        else if (w.length >= 4 && fuzzyMatch(w, key)) { terms = terms.concat(SEARCH_SYNONYMS[key]); terms.push(key); }
      });
    }
  });
  var unique = [];
  terms.forEach(function(t) { if (unique.indexOf(t) === -1) unique.push(t); });
  return unique;
}

function fuzzyMatch(query, text) {
  if (query.length < 4) return text.includes(query);
  if (text.includes(query)) return true;
  // Try removing each character from query (handles extra char typo)
  for (var i = 0; i < query.length; i++) {
    var shortened = query.slice(0, i) + query.slice(i + 1);
    if (shortened.length >= 3 && text.includes(shortened)) return true;
  }
  // Try doubling each character (handles missing double letter: mamogram→mammogram)
  for (var k = 0; k < query.length; k++) {
    var doubled = query.slice(0, k) + query[k] + query.slice(k);
    if (text.includes(doubled)) return true;
  }
  // Try swapping adjacent characters (handles transposition typos)
  for (var j = 0; j < query.length - 1; j++) {
    var swapped = query.slice(0, j) + query[j + 1] + query[j] + query.slice(j + 2);
    if (text.includes(swapped)) return true;
  }
  return false;
}

function matchesExpanded(text, expandedTerms) {
  var lower = text.toLowerCase();
  for (var i = 0; i < expandedTerms.length; i++) {
    if (lower.includes(expandedTerms[i])) return true;
  }
  return false;
}

// Built once at page load. Each entry: {type, title, preview, searchText, action}

function buildSearchIndex() {
  if (_searchIndexBuilt) return;
  SEARCH_INDEX = [];

  // Index OBJECTIONS
  if (typeof OBJECTIONS !== 'undefined') {
    OBJECTIONS.forEach(function(o,i){
      SEARCH_INDEX.push({

      var allBenText = p.benefits.map(function(b){return b.category+' '+b.items.join(' ');}).join(' ');
      var allLimText = (p.limitations||[]).join(' ');
      SEARCH_INDEX.push({
        type:'Policy Reference', title:p.name, preview:p.type,
        searchText:(p.name+' '+p.type+' '+p.carrier+' '+p.network+' '+(p.planNotes||'')+' '+allLimText+' '+(p.preEx||'')+' '+(p.waitingPeriods||[]).join(' ')+' '+allBenText).toLowerCase(),
        planId:p.id, benefits:p.benefits, limitations:p.limitations,
        action:function(){var pid=p.id;closeSearch();showPage('policydocs');setTimeout(function(){policyDocOpen=pid;var container=document.getElementById('pdResultsContainer');if(container)container.innerHTML=renderPolicyResults();setTimeout(function(){var el=document.getElementById('pd-'+pid);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);},200);}
      });
    });
  }

  // Index CLOSES
  if (typeof CLOSES !== 'undefined') {
    CLOSES.forEach(function(c,i){
      SEARCH_INDEX.push({
        type:'Closing Lines', title:(c.type||'Close')+ ' — ' +(c.line||'').slice(0,50), preview:(c.when||'').slice(0,100),
        searchText:((c.line||'')+' '+(c.type||'')+' '+(c.when||'')+' '+(c.tone||'')+' '+(c.bridge||'')+' '+(c.hesitate||'')).toLowerCase(),
        action:function(){closeSearch();showPage('closes');}
      });
    });
  }

  // Index RECOVERY
  if (typeof RECOVERY !== 'undefined') {
    RECOVERY.forEach(function(r,i){
      SEARCH_INDEX.push({
        type:'Recovery Scripts', title:r.label||'Recovery', preview:(r.situation||'').slice(0,100),
        searchText:((r.label||'')+' '+(r.situation||'')+' '+(r.goal||'')+' '+(r.script||'')+' '+(r.soft||'')+' '+(r.strong||'')+' '+(r.bridge||'')+' '+(r.acknowledge||'')).toLowerCase(),
        action:function(){closeSearch();showPage('recovery');}
      });
    });
  }

  _searchIndexBuilt = true;
}

var _searchTimer;
function debouncedSearch(val){
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(function(){
    if(val.trim().length > 0) {
      document.getElementById('srOverlay').classList.add('show');
      var srInput = document.getElementById('srInput');
      if(srInput) { srInput.value = val; srInput.focus(); }
      doSearch(val);
    }
  },80);
}

function getBadgeClass(type) {
  var t = type.toLowerCase();
  if (t.includes('objection')) return 'sr-badge-objection';
  if (t.includes('plan vault') || t.includes('plan ')) return 'sr-badge-plan';
  if (t.includes('policy')) return 'sr-badge-policy';
  if (t.includes('benefit')) return 'sr-badge-benefit';
  if (t.includes('clos')) return 'sr-badge-close';
  if (t.includes('recovery')) return 'sr-badge-recovery';
  if (t.includes('training')) return 'sr-badge-training';
  return 'sr-badge-default';
}

function hlSearch(text, terms) {
  var safe = escHTML(text);
  terms.forEach(function(term) {
    if (term.length < 2) return;
    var re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    safe = safe.replace(re, '<mark class="sr-hl">$1</mark>');
  });
  return safe;
}

function doSearch(val){
  buildSearchIndex();
  document.getElementById('scBtn').style.display = val.length>0 ? 'block' : 'none';
  if(!val.trim()){
    document.getElementById('srList').innerHTML='';
    document.getElementById('srMatchCount').textContent='';
    return;
  }
  var expandedTerms = expandSearchSynonyms(val.toLowerCase());
  var res=[];

  SEARCH_INDEX.forEach(function(item){
    var matched = false;
    for (var i=0;i<expandedTerms.length;i++){
      if(item.searchText.includes(expandedTerms[i])){matched=true;break;}
    }
    if(!matched && val.length>=4){
      matched = fuzzyMatch(val.toLowerCase(), item.searchText);
    }
    if(!matched) return;

    if(item.type==='Policy Reference' && item.benefits){
      var matchedBens=[],matchedLims=[];
      item.benefits.forEach(function(bcat){
        bcat.items.forEach(function(itm){
          if(matchesExpanded(itm,expandedTerms)||matchesExpanded(bcat.category,expandedTerms)) matchedBens.push(itm);
        });
      });
      (item.limitations||[]).forEach(function(lim){
        if(matchesExpanded(lim,expandedTerms)) matchedLims.push(lim);
      });
      var prev='';
      if(matchedBens.length) prev=matchedBens[0];
      else if(matchedLims.length) prev=matchedLims[0];
      else prev=item.preview;
      res.push({sec:'Policy Reference — '+item.title, txt:(matchedBens.length?'Benefit: ':matchedLims.length?'Exclusion: ':'')+prev.slice(0,120), prev:(matchedBens.length?matchedBens.length+' benefit match(es)':'')+(matchedLims.length?(matchedBens.length?' · ':'')+matchedLims.length+' exclusion match(es)':''), action:item.action, type:item.type});
    } else {
      res.push({sec:item.type, txt:item.title, prev:item.preview+'...', action:item.action, type:item.type});
    }
  });

  // Match count
  document.getElementById('srMatchCount').textContent = res.length + ' result' + (res.length!==1?'s':'') + ' for "' + val + '"';

  window.srActions=res.map(function(r){return r.action;});
  document.getElementById('srList').innerHTML=res.length
    ?res.map(function(r,i){
      return '<div class="sr-item" onclick="srActions['+i+']()">'
        +'<span class="sr-badge '+getBadgeClass(r.sec)+'">'+escHTML(r.sec)+'</span>'
        +'<div class="sr-item-title">'+hlSearch(r.txt, expandedTerms)+'</div>'
        +'<div class="sr-item-preview">'+hlSearch(r.prev, expandedTerms)+'</div>'
        +(r.prev && r.prev.includes('match(es)')?'<div class="sr-item-detail">'+escHTML(r.prev)+'</div>':'')
        +'</div>';
    }).join('')
    :'<div class="sr-empty"><div class="sr-empty-icon">🔍</div><div class="sr-empty-title">No results for "'+escHTML(val)+'"</div><div class="sr-empty-suggestions"><b>Common terms:</b> x-ray, ER, hospital, surgery, prescription, copay<br><b>Plan types:</b> MEC, ACA, STM<br><b>Screenings:</b> mammogram, colonoscopy, ultrasound<br><b>Therapy:</b> physical therapy, mental health, chiropractic</div></div>';

  if(!document.getElementById('srOverlay').classList.contains('show')) {
    document.getElementById('srOverlay').classList.add('show');
    var srInput = document.getElementById('srInput');
    if(srInput && !srInput.value) srInput.value = val;
  }
}

function closeSearch(){
  document.getElementById('srOverlay').classList.remove('show');
  document.getElementById('gs').value='';
  document.getElementById('scBtn').style.display='none';
  var srInput = document.getElementById('srInput');
  if(srInput) srInput.value='';
}

// Escape key closes search
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('srOverlay').classList.contains('show')) {
    closeSearch();
  }
});

function checkCompliance() {
  var input = document.getElementById('complianceInput').value.toLowerCase().trim();
  if (!input) return;
  var flags = [
    {trigger:['covers everything','full coverage','covered for everything'], msg:'Implies comprehensive coverage.', fix:'Say: "This plan covers specific benefits — I want to walk you through exactly what those are."'},
    {trigger:["won't pay","never pay","pay nothing","zero out of pocket"], msg:'No plan eliminates all costs.', fix:'Say: "Your out-of-pocket is reduced significantly — for example, a $25 copay instead of the full visit price."'},
    {trigger:['obamacare','aca','marketplace','just like regular'], msg:'These plans are NOT ACA-compliant. Never compare.', fix:'Say: "This is a private limited-benefit plan — different from ACA major medical, and I will explain exactly how."'},
    {trigger:['pre-existing','pre existing','preexisting'], msg:'Pre-ex is excluded 12 months on all plans.', fix:'Say: "Pre-existing conditions from the last 12 months have a 12-month exclusion. After that window, they are covered."'},
    {trigger:['any doctor','see anyone','all doctors'], msg:'All plans have network restrictions.', fix:'Say: "Any doctor within the [network] — one of the largest provider networks in the country."'},
    {trigger:['mental health','therapy','psychiatric'], msg:'MEC and limited plans do NOT cover mental health.', fix:'Say: "This plan does not include mental health benefits — I always disclose that upfront."'},
    {trigger:['maternity','pregnancy','prenatal'], msg:'No plans in this portfolio cover maternity.', fix:'Say: "This plan does not cover maternity or pregnancy-related care."'},
    {trigger:['no waiting','starts immediately','covered right away','day one for sick'], msg:'Sickness has a waiting period. Only accidents are day one.', fix:'Say: "Accident coverage is day one. Sickness benefits begin after the standard waiting period of [X] days."'},
    {trigger:['covers the bill','pays the bill','pays everything','pays the hospital'], msg:'Indemnity plans pay fixed benefits — not the actual bill.', fix:'Say: "The plan pays a fixed daily benefit toward the hospital cost — not the full bill, but a defined amount directly to you."'},
    {trigger:['cheap','cheapest','bargain'], msg:'Undermines value and perceived quality.', fix:'Say: "This is designed to be affordable while giving you real everyday benefits."'},
    {trigger:['real insurance','actual insurance'], msg:'Ambiguous — must specify plan type.', fix:'Say: "This is a licensed private health benefit plan — a limited-benefit plan, not major medical."'}
  ];

  var result = document.getElementById('complianceResult');
  var found = false;
  for (var i = 0; i < flags.length; i++) {
    var f = flags[i];
    for (var j = 0; j < f.trigger.length; j++) {
      if (input.indexOf(f.trigger[j]) > -1) {
        result.innerHTML = '<div style="background:rgba(200,60,80,0.06);border:1.5px solid rgba(200,60,80,0.25);border-radius:12px;padding:16px;">' +
          '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;"><span style="font-size:20px;"></span><div style="font-weight:800;color:var(--charcoal3);">Compliance Flag Detected</div></div>' +
          '<div style="font-size:13px;color:var(--charcoal3);margin-bottom:12px;">' + f.msg + '</div>' +
          '<div style="background:rgba(41,162,106,0.08);border:1px solid rgba(41,162,106,0.25);border-radius:8px;padding:12px 14px;">' +
          '<div style="font-size:10px;font-weight:800;color:#29A26A;letter-spacing:1.5px;margin-bottom:6px;">COMPLIANT VERSION</div>' +
          '<div style="font-size:13px;color:#29A26A;font-weight:600;">' + f.fix + '</div></div></div>';
        result.style.display = 'block';
        found = true;
        break;
      }
    }
    if (found) break;
  }
  if (!found) {
    result.innerHTML = '<div style="background:rgba(41,162,106,0.08);border:1.5px solid rgba(41,162,106,0.25);border-radius:12px;padding:14px;display:flex;gap:10px;align-items:center;">' +
      '<span style="font-size:24px;"></span><div style="font-size:13px;color:#29A26A;font-weight:700;">No compliance flags detected. Phrase looks good — always make sure to include the full required disclosures on every enrollment.</div></div>';
    result.style.display = 'block';
  }
}

// ══════════════════════════════════════════════════════
function renderDiscovery() {
  var categories = [
    {type:'S', label:'Situation', color:'var(--charcoal)', icon:'', desc:'Establish context. Keep brief — move to Problem quickly.',
     questions:['What are you currently doing for coverage?','How long have you been without coverage?','Are you looking for coverage for just yourself or your family too?','Are you self-employed, between jobs, or did your employer coverage recently end?','What coverage did you have before this?']},
    {type:'P', label:'Problem', color:'#7a5f00', icon:'', desc:'Surface the gap. Get them to say the problem in their own words.',
     questions:['What worries you most about being uninsured right now?','Has going without coverage ever cost you money out of pocket?','What happens if you need to see a doctor — what does that look like for you today?','What is the biggest risk of staying without a plan right now?','What has kept you from getting coverage up until now?']},
    {type:'I', label:'Implication', color:'var(--charcoal2)', icon:'', desc:'Make the problem bigger. Connect the gap to real financial consequences.',
     questions:['What would happen financially if you ended up in the hospital without coverage?','If you got into an accident tomorrow, what would that cost you out of pocket?','How much would one ER visit set you back right now?','Has not having coverage ever made you hesitate to go to the doctor when you probably should have?','If something happened and you had a $15,000 hospital bill — how would that change your financial situation?']},
    {type:'N', label:'Need-Payoff', color:'#29A26A', icon:'', desc:'Let them sell themselves. Ask what it would feel like to have this solved.',
     questions:['So having something in place would give you peace of mind?','If you had a plan that covered your doctor visits and gave you telemedicine at no cost — how would that change things?','How important is it to get this handled now rather than waiting?','Would it help to know that if something happened, you had coverage in place?','If we could get you covered starting tomorrow, would that solve the problem you described?']}
  ];

  var html = '<div class="ph"><div class="pt">Discovery <span>Questions</span></div>';
  html += '<div class="pd">SPIN-based question bank. Tap any question to copy it. Use Situation first, then Problem, then Implication, then Need-Payoff before presenting.</div></div>';

  html += '<div style="background:rgba(81,117,241,0.04);border:1px solid rgba(220,170,180,0.2);border-radius:12px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--charcoal);line-height:1.6;">';
  html += '<strong style="color:var(--charcoal3);">The SPIN Rule:</strong> Never present before you diagnose. Run at least one Problem and one Implication question before showing any plan. The prospect\'s pain must be real to them — not just to you.';
  html += '</div>';

  categories.forEach(function(cat, ci) {
    var did = 'disc-' + ci;
    html += '<div class="xcard" id="' + did + '" style="margin-bottom:10px;">';
    // Header — clickable toggle
    html += '<div class="xcard-hd" onclick="toggleDisc(\'' + did + '\')" style="display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;">';
    html += '<div style="width:34px;height:34px;border-radius:50%;background:rgba(26,29,38,0.08);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:.9rem;color:#5C6878;flex-shrink:0;">' + cat.type + '</div>';
    html += '<div class="u-flex1"><div class="xcard-label">' + cat.label + ' Questions</div>';
    html += '<div class="xcard-sub">' + cat.desc + '</div></div>';
    html += '<div style="display:flex;align-items:center;gap:8px;">';
    html += '<span style="font-family:var(--font-ui);font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(26,29,38,0.06);color:var(--txt-muted);">' + cat.questions.length + ' questions</span>';
    html += '<span class="xcard-chev" id="' + did + '-chev">▼</span></div>';
    html += '</div>';
    // Body — hidden by default
    html += '<div id="' + did + '-body" style="display:none;padding:4px 18px 16px;border-top:1px solid var(--rule);">';
    cat.questions.forEach(function(q) {
      html += '<div onclick="copyDiscovery(this)" data-q="' + q.replace(/"/g,'&quot;') + '" ';
      html += 'style="padding:11px 14px;background:var(--bg-card2);border:1px solid var(--rule);border-radius:8px;margin-top:8px;cursor:pointer;font-family:var(--font-body);font-size:.8rem;color:var(--txt-head);line-height:1.55;transition:all 0.15s;" ';
      html += 'onmouseover="this.style.borderColor=\'rgba(92,104,120,0.28)\';this.style.background=\'var(--bg-card3)\'" ';
      html += 'onmouseout="this.style.borderColor=\'var(--rule)\';this.style.background=\'var(--bg-card2)\'">';
      html += '\u201c' + q + '\u201d';
      html += '<span style="display:block;font-family:var(--font-ui);font-size:.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt-muted);margin-top:5px;">Tap to copy</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });

  html += '<div id="discoveryCopied" style="display:none;position:fixed;bottom:30px;right:30px;background:#29A26A;color:#fff;border-radius:12px;padding:12px 20px;font-weight:700;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,0.15);">Copied to clipboard ✓</div>';

  var _page_discovery = document.getElementById('page-discovery'); if(_page_discovery) _page_discovery.innerHTML = html;
}

function toggleDisc(id) {
  var body = document.getElementById(id + '-body');
  var chev = document.getElementById(id + '-chev');
  var card = document.getElementById(id);
  var isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (chev) chev.style.transform = isOpen ? '' : 'rotate(180deg)';
  card.classList.toggle('open', !isOpen);
}

function copyDiscovery(el) {
  var q = el.getAttribute('data-q');
  if (navigator.clipboard) navigator.clipboard.writeText(q);
  var toast = document.getElementById('discoveryCopied');
  if (toast) { toast.style.display='block'; setTimeout(function(){toast.style.display='none';},2000); }
}

function renderCoachingai() {
  var html = '<div class="ph"><div class="pt">Call Coach <span>AI</span></div>';
  html += '<div class="pd">Paste in something you said on a call. The AI identifies confidence leaks, filler words, and weak language — then rewrites it stronger.</div></div>';

  html += '<div style="background:#FFFFFF;border:1px solid #E8EBF5;border-radius:12px;padding:20px;margin-bottom:16px;">';
  html += '<div style="font-weight:700;font-size:13px;color:var(--charcoal3);margin-bottom:8px;">Paste what you said on the call:</div>';
  html += '<textarea id="coachInput" placeholder="Example: Maybe this could work for you, I think it might help..." style="width:100%;height:80px;background:var(--milk);border:1px solid #E8EBF5;border-radius:12px;padding:12px;font-size:13px;color:var(--charcoal3);resize:none;box-sizing:border-box;"></textarea>';
  html += '<button onclick="analyzeCall()" style="width:100%;background:rgba(212,96,122,0.13);color:var(--charcoal3);border:1px solid rgba(212,96,122,0.3);border-radius:12px;padding:12px;font-weight:800;font-size:14px;cursor:pointer;margin-top:10px;">Analyze My Language →</button>';
  html += '</div>';
  html += '<div id="coachResult" class="u-hide"></div>';

  // Common patterns library
  html += '<div style="font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--charcoal3);margin:20px 0 12px;">Common Confidence Leaks — Know These Cold</div>';
  var leaks = [
    {bad:'Maybe this could work.',good:'Based on what you told me, this is the right plan for your situation.',why:'Maybe signals uncertainty. You are the expert — speak like one.'},
    {bad:'I think this might help.',good:'This plan directly addresses what you described.',why:'Think + might = double uncertainty. Use declarative language.'},
    {bad:'It\'s not that expensive.',good:'At $[X] a month, this is less than the cost of one urgent care visit.',why:'Don\'t define value by price. Anchor to comparison.'},
    {bad:'Sorry to bother you.',good:'I appreciate your time — this will only take a few minutes.',why:'Apologizing for your call signals low value. Never apologize for offering help.'},
    {bad:'If you\'re interested...',good:'When we get you enrolled today...',why:'If suggests they might not be. Assume the sale.'},
    {bad:'Does that make sense?',good:'Is there anything you want me to walk through again?',why:'Asking if it makes sense implies you think it might not. Ask for their questions instead.'},
    {bad:'Umm... so... basically...',good:'[Pause. Breathe. Then speak.]',why:'Filler words signal unpreparedness. Silence is more powerful than umm.'},
    {bad:'I\'m not sure but I think...',good:'Let me confirm that for you — [give the exact answer].',why:'Uncertainty about your own product kills credibility instantly.'},
    {bad:'It\'s kind of like regular insurance.',good:'This is a private limited-benefit plan. Here is exactly how it works.',why:'Kind of = vague. Also a compliance issue — never compare to regular insurance.'},
    {bad:'A lot of people don\'t really use it much.',good:'Most members use telemedicine for their everyday needs — it resolves about 70% of common conditions.',why:'Underselling your own product before the client even asks.'}
  ];

  leaks.forEach(function(l) {
    html += '<div style="background:#FFFFFF;border:1px solid #E8EBF5;border-radius:12px;margin-bottom:10px;overflow:hidden;">';
    html += '<div style="padding:12px 16px;background:rgba(200,60,80,0.04);border-bottom:1px solid rgba(200,60,80,0.1);">';
    html += '<div style="display:flex;gap:8px;align-items:flex-start;"><span style="color:var(--charcoal3);flex-shrink:0;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span><div style="font-size:13px;color:var(--charcoal3);font-weight:600;">' + l.bad + '</div></div>';
    html += '<div style="font-size:11px;color:#B08090;margin-top:4px;padding-left:20px;">' + l.why + '</div></div>';
    html += '<div style="padding:12px 16px;display:flex;gap:8px;align-items:flex-start;"><span style="color:#29A26A;flex-shrink:0;">✔</span>';
    html += '<div style="font-size:13px;color:#29A26A;font-weight:700;">' + l.good + '</div></div></div>';
  });

  var _page_coachingai = document.getElementById('page-coachingai'); if(_page_coachingai) _page_coachingai.innerHTML = html;
}

function analyzeCall() {
  var input = document.getElementById('coachInput').value.trim();
  if (!input) return;
  var lower = input.toLowerCase();

  var flags = [
    {triggers:['maybe','might','could work','might help','possibly'], label:'Uncertainty Language', severity:'high', suggestion:'Replace with declarative statements. You are the expert.'},
    {triggers:['i think','i believe','i feel like','i suppose'], label:'Hedging Language', severity:'high', suggestion:'State facts directly. Remove "I think" — just say it.'},
    {triggers:['sorry','apologize','bother','interrupt'], label:'Apologetic Opener', severity:'medium', suggestion:'Never apologize for offering help. Say "I appreciate your time" instead.'},
    {triggers:['umm','uh','um,','uh,','basically','you know','like,'], label:'Filler Words', severity:'medium', suggestion:'Pause instead of filling silence. Silence reads as confidence.'},
    {triggers:['if you are interested','if you want','if you decide'], label:'Assumptive Failure', severity:'high', suggestion:'Use "when" not "if." Assume the sale.'},
    {triggers:['not that expensive','pretty cheap','affordable enough'], label:'Weak Value Language', severity:'medium', suggestion:'Anchor to comparison: "Less than the cost of one urgent care visit."'},
    {triggers:['make sense?','does that make sense','understand?'], label:'Competence Signal', severity:'low', suggestion:'Ask "What questions do you have?" instead of implying it might be confusing.'},
    {triggers:['kind of like','sort of like','similar to regular','like obamacare','like major medical'], label:'Compliance Risk + Vague Comparison', severity:'critical', suggestion:'This is a compliance issue. Never compare to ACA or regular insurance. State the plan type specifically.'},
    {triggers:["i'm not sure","not sure about that","i don't know"], label:'Knowledge Gap Signal', severity:'high', suggestion:'Say: "Let me confirm that for you." Never signal uncertainty about your product.'},
    {triggers:['no one really','people don\'t usually','not many people'], label:'Underselling', severity:'medium', suggestion:'Never diminish your product before the client does. Lead with value.'}
  ];

  var found = [];
  flags.forEach(function(f) {
    f.triggers.forEach(function(t) {
      if (lower.indexOf(t) > -1 && found.indexOf(f) === -1) found.push(f);
    });
  });

  var severityColor = {critical:'var(--charcoal3)', high:'var(--charcoal3)', medium:'#7a5f00', low:'var(--sec)'};
  var severityBg = {critical:'rgba(200,60,80,0.08)', high:'rgba(92,104,120,0.04)', medium:'rgba(184,134,11,0.06)', low:'rgba(123,104,184,0.06)'};

  if (!found.length) {
    html = '<div style="background:rgba(41,162,106,0.08);border:1.5px solid rgba(41,162,106,0.25);border-radius:12px;padding:20px;display:flex;gap:12px;align-items:center;">';
    html += '<span style="font-size:32px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7.5 12l3.5 3.5 6-7"/></svg></span><div><div style="font-weight:800;font-size:15px;color:#29A26A;">No confidence leaks detected.</div>';
    html += '<div style="font-size:13px;color:#3A7A6A;margin-top:4px;">Your language is strong and direct. Keep going.</div></div></div>';
  } else {
    html += '<div style="background:#FFFFFF;border:1px solid #E8EBF5;border-radius:12px;padding:20px;margin-bottom:16px;">';
    html += '<div style="font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--charcoal3);margin-bottom:4px;">' + found.length + ' issue' + (found.length>1?'s':'') + ' found</div>';
    html += '<div style="font-size:12px;color:var(--warmgray3);margin-bottom:16px;">Your original: <em style="color:var(--charcoal);">"' + escHTML(input) + '"</em></div>';
    found.forEach(function(f) {
      html += '<div style="background:' + severityBg[f.severity] + ';border-left:3px solid ' + severityColor[f.severity] + ';border-radius:8px;padding:12px 14px;margin-bottom:10px;">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
      html += '<span style="background:' + severityColor[f.severity] + '22;color:' + severityColor[f.severity] + ';border-radius:12px;padding:2px 10px;font-size:10px;font-weight:800;">' + f.severity.toUpperCase() + '</span>';
      html += '<div style="font-weight:700;font-size:13px;color:var(--charcoal3);">' + f.label + '</div></div>';
      html += '<div style="font-size:12px;color:var(--charcoal);">' + f.suggestion + '</div></div>';
    });

    // Rewrite suggestion
    var rewrite = input
      .replace(/maybe /gi,'')
      .replace(/i think /gi,'')
      .replace(/i believe /gi,'')
      .replace(/might /gi,'will ')
      .replace(/could /gi,'will ')
      .replace(/sort of /gi,'')
      .replace(/kind of /gi,'')
      .replace(/if you are interested/gi,'when we get you enrolled')
      .replace(/if you want/gi,'when you are ready')
      .replace(/does that make sense\??/gi,'What questions do you have?')
      .replace(/umm+,?\s*/gi,'')
      .replace(/uh,?\s*/gi,'')
      .replace(/basically,?\s*/gi,'')
      .replace(/you know,?\s*/gi,'');

    html += '<div style="margin-top:16px;background:var(--milk);border-left:3px solid #29A26A;border-radius:12px;padding:14px 16px;">';
    html += '<div style="font-size:10px;font-weight:800;letter-spacing:1.5px;color:#29A26A;margin-bottom:8px;">STRONGER VERSION</div>';
    html += '<div style="font-size:14px;color:#2A4A40;font-weight:600;line-height:1.6;">"' + escHTML(rewrite.trim()) + '"</div></div>';
    html += '</div>';
  }

  el.innerHTML = html;
  el.style.display = 'block';
  el.scrollIntoView({behavior:'smooth', block:'start'});
}

var planScriptFilter = 'All';
var planScriptActive = 0;

function renderPlanScripts() {

  if (planScriptSection >= activePlan.sections.length) planScriptSection = 0;

  html += '</div>';
  var _page_planscripts = document.getElementById('page-planscripts'); if(_page_planscripts) _page_planscripts.innerHTML = html;

  var total=0;

// ── RENDER: POLICY BENEFITS REFERENCE ──────────────────────────
var policyDocFilter = 'All';
var policyDocSearch = '';
var policyDocOpen = null;
var _pdSearchTimer;

function renderPolicydocs() {
  var html = '<div class="ph"><div class="pt">Policy Benefits <span>Reference</span></div>';
  html += '<div class="pd">Real written benefits, limitations, and exclusions sourced directly from plan documents. Tap any plan to see the full details.</div></div>';

  // Compliance banner
  html += '<div class="comp-banner"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg> <strong>Source documents:</strong> Benefits, limitations, and exclusions below are extracted directly from official plan brochures and SPDs. Always verify current rates and state-specific variations with your carrier before enrollment.</div>';

  // Filter tabs
  html += '<div class="stabs" style="margin-bottom:16px;">';
  ['All','MEC','STM','Limited'].forEach(function(f) {
    html += '<button class="stab' + (f === policyDocFilter ? ' active' : '') + '" onclick="policyDocFilter=\'' + f + '\';policyDocFilterChanged()">' + (f==='All'?'All Plans':f==='MEC'?'MEC Plans':f==='STM'?'Short-Term Medical':'Limited Benefit') + '</button>';
  });
  html += '</div>';

  // Search box — this is a stable container that won't be destroyed
  html += '<div style="position:relative;margin-bottom:18px;">';
  html += '<span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt-muted)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>';
  html += '<input type="text" id="pdSearchInput" placeholder="Search plans, benefits, exclusions..." value="' + escHTML(policyDocSearch) + '" aria-label="Search plans, benefits, exclusions" oninput="policyDocSearchTyping(this.value)" style="width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--rule2);border-radius:var(--r-pill);font-family:var(--font-body);font-size:.82rem;background:#FFFFFF;color:var(--txt-head);outline:none;" onfocus="this.style.borderColor=\'#5175F1\'" onblur="this.style.borderColor=\'var(--rule2)\'">';
  html += '</div>';

  // Results container — only this part gets re-rendered on search
  html += '<div id="pdResultsContainer">';
  html += renderPolicyResults();
  html += '</div>';

  var _page_policydocs = document.getElementById('page-policydocs'); if(_page_policydocs) _page_policydocs.innerHTML = html;
}

function policyDocSearchTyping(val) {
  policyDocSearch = val;
  clearTimeout(_pdSearchTimer);
  _pdSearchTimer = setTimeout(function() {
    var container = document.getElementById('pdResultsContainer');
    if (container) container.innerHTML = renderPolicyResults();
  }, 200);
}

function policyDocFilterChanged() {
  var container = document.getElementById('pdResultsContainer');
  if (container) {
    container.innerHTML = renderPolicyResults();
  }
  // Update filter tab active states
  var tabs = document.querySelectorAll('.stabs .stab');
  var filters = ['All','MEC','STM','Limited'];
  tabs.forEach(function(tab, i) {
    if (filters[i] === policyDocFilter) tab.classList.add('active');
    else tab.classList.remove('active');
  });
}

function renderPolicyResults() {
  var html = '';
  // Filter and search plans
  var filtered = POLICY_DOCS.filter(function(p) {
    var groupOk = policyDocFilter === 'All' || p.group === policyDocFilter;
    if (!groupOk) return false;
    if (!policyDocSearch.trim()) return true;
    var q = policyDocSearch.toLowerCase();
    var expandedTerms = expandSearchSynonyms(q);
    var searchable = (p.name + ' ' + p.type + ' ' + p.carrier + ' ' + p.network + ' ' + p.planNotes + ' ' +
      p.limitations.join(' ') + ' ' + p.benefits.map(function(b){return b.category + ' ' + b.items.join(' ');}).join(' ') +
      ' ' + (p.preEx || '') + ' ' + (p.waitingPeriods || []).join(' ')).toLowerCase();
    for (var t = 0; t < expandedTerms.length; t++) {
      if (searchable.includes(expandedTerms[t])) return true;
    }
    return false;
  });

  if (!filtered.length) {
    html += '<div style="text-align:center;padding:40px;color:var(--txt-muted);font-size:.88rem;">No plans match your search.</div>';
    return html;
  }

  // Group by type
  var groups = [{key:'MEC',label:'MEC Plans',color:'#5175F1'},{key:'STM',label:'Short-Term Medical',color:'#F59E0B'},{key:'Limited',label:'Limited Benefit Plans',color:'#DC2626'}];
  groups.forEach(function(grp) {
    var plans = filtered.filter(function(p){return p.group===grp.key;});
    if (!plans.length) return;

    html += '<div style="margin-bottom:8px;display:flex;align-items:center;gap:10px;">';
    html += '<div style="font-family:var(--font-display);font-size:1rem;font-weight:800;color:var(--txt-hero)">' + grp.label + '</div>';
    html += '<div style="flex:1;height:1px;background:var(--rule)"></div>';
    html += '<span style="background:' + grp.color + '18;color:' + grp.color + ';border-radius:999px;padding:2px 10px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em">' + plans.length + ' plans</span>';
    html += '</div>';

    plans.forEach(function(plan) {
      var isOpen = policyDocOpen === plan.id;
      html += '<div id="pd-' + plan.id + '" style="background:#FFFFFF;border:1.5px solid ' + (isOpen ? grp.color : 'var(--rule)') + ';border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow-card);transition:all 0.18s;">';

      // Header
      html += '<div onclick="policyDocToggle(\'' + plan.id + '\')" style="padding:14px 18px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;">';
      html += '<div class="u-flex1">';
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">';
      html += '<span style="font-family:var(--font-ui);font-size:1rem;font-weight:800;color:var(--txt-hero)">' + plan.name + '</span>';
      html += '<span style="background:' + grp.color + '18;color:' + grp.color + ';border-radius:999px;padding:2px 10px;font-size:.6rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase">' + plan.type + '</span>';
      html += '</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:5px;">';
      html += '<span style="background:rgba(62,207,142,0.10);color:#2E7D52;border-radius:999px;padding:2px 9px;font-size:.62rem;font-weight:700;letter-spacing:0.04em">' + plan.network + '</span>';
      html += '<span style="background:rgba(26,31,54,0.06);color:var(--txt-body);border-radius:999px;padding:2px 9px;font-size:.62rem;font-weight:600">' + plan.carrier + '</span>';
      html += '<span style="background:rgba(245,166,35,0.10);color:#A07A06;border-radius:999px;padding:2px 9px;font-size:.62rem;font-weight:600">' + plan.assoc + '</span>';
      html += '</div></div>';
      html += '<span style="color:var(--txt-muted);font-size:11px;flex-shrink:0;transform:' + (isOpen?'rotate(180deg)':'rotate(0)') + ';transition:transform 0.2s;margin-top:4px">▼</span>';
      html += '</div>';

      if (isOpen) {
        html += '<div style="padding:0 18px 20px;border-top:1px solid var(--rule);">';

        // Agent note
        html += '<div style="background:rgba(81,117,241,0.06);border-left:3px solid #5175F1;border-radius:0 var(--r-md) var(--r-md) 0;padding:10px 14px;margin:14px 0;font-family:var(--font-body);font-size:.82rem;color:var(--txt-body);line-height:1.6;">';
        html += '<span style="font-family:var(--font-ui);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#5175F1;display:block;margin-bottom:4px;">Agent Note</span>';
        html += plan.planNotes + '</div>';

        // Waiting periods + pre-ex strip
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">';
        html += '<div style="background:rgba(62,207,142,0.07);border:1px solid rgba(62,207,142,0.18);border-radius:var(--r-md);padding:10px 12px;">';
        html += '<div style="font-family:var(--font-ui);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2E7D52;margin-bottom:6px;">Waiting Periods</div>';
        plan.waitingPeriods.forEach(function(w){html += '<div style="font-size:.78rem;color:var(--txt-body);margin-bottom:3px;font-weight:600">• ' + w + '</div>';});
        html += '</div>';
        html += '<div style="background:rgba(237,95,116,0.07);border:1px solid rgba(237,95,116,0.18);border-radius:var(--r-md);padding:10px 12px;">';
        html += '<div style="font-family:var(--font-ui);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#DC2626;margin-bottom:6px;">Pre-Existing Conditions</div>';
        html += '<div style="font-size:.78rem;color:var(--txt-body);font-weight:600">' + plan.preEx + '</div>';
        html += '</div></div>';

        // Benefits section
        html += '<div style="font-family:var(--font-ui);font-size:.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt-muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;">Covered Benefits<span style="flex:1;height:1px;background:var(--rule);display:block"></span></div>';
        html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-bottom:16px;">';
        plan.benefits.forEach(function(bcat) {
          html += '<div style="background:var(--bg-card2);border:1px solid var(--rule);border-radius:var(--r-md);padding:12px 14px;">';
          html += '<div style="font-family:var(--font-ui);font-size:.68rem;font-weight:800;color:var(--txt-head);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em">' + bcat.category + '</div>';
          bcat.items.forEach(function(item){
            html += '<div style="font-size:.78rem;color:var(--txt-body);margin-bottom:4px;padding-left:10px;border-left:2px solid rgba(81,117,241,0.20);line-height:1.5;font-weight:500">' + item + '</div>';
          });
          html += '</div>';
        });
        html += '</div>';

        // Limitations section
        html += '<div style="font-family:var(--font-ui);font-size:.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt-muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;">Limitations & Exclusions<span style="flex:1;height:1px;background:var(--rule);display:block"></span></div>';
        html += '<div style="background:rgba(237,95,116,0.04);border:1px solid rgba(237,95,116,0.14);border-radius:var(--r-md);padding:14px 16px;">';
        plan.limitations.forEach(function(lim){
          html += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;">';
          html += '<span style="color:#DC2626;flex-shrink:0;margin-top:1px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>';
          html += '<div style="font-size:.78rem;color:var(--txt-body);line-height:1.5;font-weight:500">' + lim + '</div>';
          html += '</div>';
        });
        html += '</div>';

        // Source document reference
        html += '<div style="margin-top:12px;padding:8px 12px;background:var(--bg-card2);border-radius:var(--r-md);font-size:.7rem;color:var(--txt-muted);font-weight:600;">';
        html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
        html += 'Source: ' + plan.source + '</div>';

        html += '</div>'; // end open body
      }
      html += '</div>'; // end plan card
    });
    html += '<div style="margin-bottom:20px;"></div>';
  });

  return html;
}

function policyDocToggle(id) {
  policyDocOpen = (policyDocOpen === id) ? null : id;
  var container = document.getElementById('pdResultsContainer');
  if (container) container.innerHTML = renderPolicyResults();
  if (policyDocOpen) {
    setTimeout(function(){
      var el = document.getElementById('pd-' + id);
      if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 50);
  }
}

function showPage(id) {
  var searchOverlay = document.getElementById('srOverlay');
  if (searchOverlay && searchOverlay.classList.contains('show')) closeSearch();
  // Safety: if target page doesn't exist yet, defer
  var target = document.getElementById('page-' + id);
  if (!target) { if(!window._spRetry)window._spRetry=0; if(window._spRetry++<20){setTimeout(function(){showPage(id);},100);} return; }
  window._spRetry=0;
  if (PAGE_CONFIG[id]) {
    _showComboPage(id, PAGE_CONFIG[id].subs[0].id);
    return;
  }
  if (SUB_TO_PARENT[id]) {
    _showComboPage(SUB_TO_PARENT[id], id);
    return;
  }
  document.querySelectorAll('.page, .combo-page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');b.removeAttribute('aria-current');});
  var pg = document.getElementById('page-' + id);
  if(pg) pg.classList.add('active');
  var btn = document.querySelector('.nb[onclick="showPage(\'' + id + '\')"]');
  if(btn) { btn.classList.add('active'); btn.setAttribute('aria-current','page'); }
  var renderMap = {objections:renderObjections, policydocs:renderPolicydocs};
  if(renderMap[id]) renderMap[id]();
}

function _showComboPage(parentId, subId) {
  document.querySelectorAll('.page, .combo-page').forEach(function(p){
    p.classList.remove('active');
    if (p.classList.contains('page')) p.style.display = '';
  });
  var comboPage = document.getElementById('page-' + parentId);
  if(comboPage) comboPage.classList.add('active');
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  var btn = document.querySelector('.nb[onclick="showPage(\'' + parentId + '\')"]');
  if(btn) btn.classList.add('active');
  renderSubTabs(parentId, subId);
  var subs = PAGE_CONFIG[parentId].subs;
  subs.forEach(function(s) {
    var inner = document.getElementById('page-' + s.id);
    if (inner) inner.style.display = (s.id === subId) ? 'block' : 'none';
  });
  for (var i = 0; i < subs.length; i++) {
    if (subs[i].id === subId) {
      if (subs[i].render) subs[i].render();
      break;
    }
  }
}

function renderSubTabs(parentId, activeSubId) {
  var container = document.getElementById('subtabs-' + parentId);
  if (!container) return;
  var config = PAGE_CONFIG[parentId];
  if (!config || config.subs.length <= 1) { container.innerHTML = ''; return; }
  var html = '<div class="page-subtabs-inner">';
  config.subs.forEach(function(sub) {
    var isActive = sub.id === activeSubId ? ' active' : '';
    html += '<button class="stab' + isActive + '" onclick="_showComboPage(\'' + parentId + '\',\'' + sub.id + '\')">' + sub.label + '</button>';
  });
  html += '</div>';
  container.innerHTML = html;
}

// Smart engine — no API key needed

function brBuildSOB(p) {
  var entries = [];
  p.benefits.forEach(function(b) {
    b.items.forEach(function(item) {
      entries.push({ category: b.category, text: item });
    });
  });
  p.limitations.forEach(function(l) {
    entries.push({ category: 'Exclusions / Limitations', text: l });
  });
  entries.push({ category: 'Waiting Periods', text: p.waitingPeriods.join(' | ') });
  entries.push({ category: 'Pre-Existing Conditions', text: p.preEx });
  entries.push({ category: 'Agent Note', text: p.planNotes });
  return entries;
}

function brInit() {
  if (typeof POLICY_DOCS === 'undefined' || !POLICY_DOCS.length) return;
  if (!document.getElementById('br-plan-bar')) return;

  BR_PLANS = POLICY_DOCS.map(function(p) {
    return { id: p.id, name: p.name, group: p.group, type: p.type, entries: brBuildSOB(p) };
  });
  if (!BR_PLANS.length) return;
  brActivePlan = BR_PLANS[0];

  // Build plan bar with "All Plans" toggle
  var planBar = document.getElementById('br-plan-bar');
  var allBtn = document.createElement('button');
  allBtn.className = 'br-plan-btn br-all-btn';
  allBtn.textContent = 'All Plans';
  allBtn.dataset.id = '__all__';
  allBtn.onclick = function() {
    brSearchAllPlans = !brSearchAllPlans;
    allBtn.classList.toggle('active', brSearchAllPlans);
    document.getElementById('br-msgs').innerHTML = '';
    brShowWelcome();
  };
  planBar.appendChild(allBtn);

  var lastGrp = null;
  var grpNames = { MEC: 'MEC', STM: 'STM', Limited: 'Limited' };
  BR_PLANS.forEach(function(p) {
    if (p.group !== lastGrp) {
      var lbl = document.createElement('span');
      lbl.className = 'br-grp-lbl';
      lbl.textContent = grpNames[p.group] || p.group;
      planBar.appendChild(lbl);
      lastGrp = p.group;
    }
    var btn = document.createElement('button');
    btn.className = 'br-plan-btn' + (p.id === brActivePlan.id ? ' active' : '');
    btn.textContent = p.name;
    btn.dataset.id = p.id;
    btn.onclick = function() {
      brSearchAllPlans = false;
      document.querySelector('.br-all-btn').classList.remove('active');
      brActivePlan = BR_PLANS.find(function(x) { return x.id === p.id; });
      document.querySelectorAll('.br-plan-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.id === p.id);
      });
      document.getElementById('br-msgs').innerHTML = '';
      brShowWelcome();
    };
    planBar.appendChild(btn);
  });

  // Build search index on init
  buildSearchIndex();
  brShowWelcome();
}

function brSearch(query) {
  var expandedTerms = expandSearchSynonyms(query.toLowerCase());
  var plansToSearch = brSearchAllPlans ? BR_PLANS : (brActivePlan ? [brActivePlan] : []);
  var allResults = [];

  plansToSearch.forEach(function(plan) {
    var results = [];
    plan.entries.forEach(function(entry) {
      var text = entry.text.toLowerCase();
      var cat = entry.category.toLowerCase();
      var score = 0;
      expandedTerms.forEach(function(term) {
        if (text.includes(term)) score += 2;
        if (cat.includes(term)) score += 1;
      });
      if (score > 0) results.push({ entry: entry, score: score, planName: plan.name, planId: plan.id });
    });
    allResults = allResults.concat(results);
  });

  allResults.sort(function(a, b) { return b.score - a.score; });
  return allResults.slice(0, 20);
}

function brFormatResults(results, query) {
  if (!results.length) {
    var expandedTerms = expandSearchSynonyms(query.toLowerCase());
    var synonymNote = expandedTerms.length > 1 ? '<br><small style="color:#B8ADA0">Also searched: ' + expandedTerms.slice(1,5).join(', ') + (expandedTerms.length>5?' + more':'') + '</small>' : '';

      '<div style="margin-top:8px;"><button onclick="brAskAI(decodeURIComponent(\'' + encodeURIComponent(query) + '\'))" style="background:#5175F1;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;">Ask AI for help</button></div>';
  }

  var expandedTerms = expandSearchSynonyms(query.toLowerCase());

  function highlight(text) {
    var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    expandedTerms.forEach(function(term) {
      if (term.length < 2) return;
      var re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
      safe = safe.replace(re, '<mark style="background:#FFF3CD;padding:0 2px;border-radius:2px;font-weight:700">$1</mark>');
    });
    return safe;
  }

  // Group by plan, then by category
  var byPlan = {};
  results.forEach(function(r) {
    var key = r.planName || 'Unknown';
    if (!byPlan[key]) byPlan[key] = {};
    var cat = r.entry.category;
    if (!byPlan[key][cat]) byPlan[key][cat] = [];
    byPlan[key][cat].push(r.entry.text);
  });

  var html = '<div style="font-size:11px;color:#9A8F7E;margin-bottom:8px">' + results.length + ' result(s)' + (brSearchAllPlans ? ' across all plans' : ' in <strong>' + brActivePlan.name + '</strong>') + '</div>';

  var catColors = {'Exclusions / Limitations':'#FFFFFF','Waiting Periods':'#FFFFFF','Pre-Existing Conditions':'#FFFFFF','Agent Note':'#F8FAFF'};
  var catBorders = {'Exclusions / Limitations':'#E8EBF5','Waiting Periods':'#E8EBF5','Pre-Existing Conditions':'#E8EBF5','Agent Note':'#E8EBF5'};
  var catLeftBorders = {'Exclusions / Limitations':'#DC2626','Waiting Periods':'#F59E0B','Pre-Existing Conditions':'#F59E0B','Agent Note':'#5175F1'};
  var catIcons = {'Exclusions / Limitations':LI.ban,'Waiting Periods':LI.clock,'Pre-Existing Conditions':LI.warn,'Agent Note':LI.bulb};

  Object.keys(byPlan).forEach(function(planName) {
    if (brSearchAllPlans) {
      html += '<div style="font-size:11px;font-weight:800;color:#5175F1;margin:8px 0 4px;letter-spacing:0.04em;text-transform:uppercase;">' + LI.file + ' ' + planName + '</div>';
    }
    var grouped = byPlan[planName];
    Object.keys(grouped).forEach(function(cat) {
      var bg = catColors[cat] || '#FFFFFF';
      var border = catBorders[cat] || '#E8EBF5';
      var leftBorder = catLeftBorders[cat] || '#29A26A';
      var icon = catIcons[cat] || LI.check;
      html += '<div style="background:' + bg + ';border:1px solid ' + border + ';border-left:3px solid ' + leftBorder + ';border-radius:8px;padding:9px 12px;margin-bottom:7px;">';
      html += '<div style="font-size:10px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;color:#374151">' + icon + ' ' + cat + '</div>';
      grouped[cat].forEach(function(text) {
        html += '<div style="font-size:12.5px;line-height:1.55;margin-bottom:4px;color:#1C2035;padding-left:8px;border-left:2px solid #E8EBF5">' + LI.dot + ' ' + highlight(text) + '</div>';
      });
      html += '</div>';
    });
  });

  // Add "Ask AI" button for deeper questions
  html += '<div style="margin-top:8px;text-align:center;"><button onclick="brAskAI(decodeURIComponent(\'' + encodeURIComponent(query) + '\'))" style="background:#5175F1;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;opacity:0.85;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.85">' + LI.brain + ' Deep Analysis</button></div>';

  return html;
}

function brSend() {
  var inp = document.getElementById('br-input');
  var query = inp.value.trim();
  if (!query) return;

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('br-send').disabled = true;

  brAddMsg('user', query.replace(/</g,'&lt;').replace(/>/g,'&gt;'));

  // PRIMARY BEHAVIOR: Dashboard first → AI fallback → Safe fallback
  var plansToUse = brSearchAllPlans ? BR_PLANS : (brActivePlan ? [brActivePlan] : []);
  var structured = brStructuredAnswer(query, plansToUse);
  brAddMsg('ai', structured);

  document.getElementById('br-send').disabled = false;
  document.getElementById('br-input').focus();

// Returns: Coverage Status | Internal Answer | Client Rebuttal | Source Type

var REBUTTALS = {

function pickRebuttal(type) {
  var arr = REBUTTALS[type] || REBUTTALS.notCovered;
  return arr[Math.floor(Math.random() * arr.length)];
}

function brStructuredAnswer(query, plans) {
  var q = query.toLowerCase().trim();
  var expandedTerms = expandSearchSynonyms(q);
  var specificTerms = getSpecificTerms(q);
  // Combine both for matching — use expanded for finding, specific for highlighting
  var searchTerms = expandedTerms.slice();
  specificTerms.forEach(function(t) { if (searchTerms.indexOf(t) === -1) searchTerms.push(t); });
  // Also add query words individually for partial matching (skip stop words + short words)
  var STOP_WORDS = ['the','this','that','what','does','they','them','their','have','has','had','been','being','will','would','could','should','about','from','with','just','like','more','some','than','were','there','here','when','where','which','into','also','each','other','only','very','much','such','over','most','same','make','after','before','back','even','take','come','give','look','find','know','want','tell','work','keep','help','show','turn','move','live','long','got','get','getting','any','can','are','for','but','all','how','who','its','our','you','your','his','her','him','she','really','still','cover','covered','coverage','include','included','includes','plan','plans','process','service','services','cost','costs','need','needs','going','much','many','also','right','good','best','info','information','question','answer'];
  q.split(/\s+/).forEach(function(w) { if (w.length >= 4 && STOP_WORDS.indexOf(w) === -1 && searchTerms.indexOf(w) === -1) searchTerms.push(w); });

  // Search dashboard content
  var allBenefits = [], allExclusions = [], allWaiting = [], allPreex = [];
  var matchedPlans = [];

  plans.forEach(function(plan) {
    var benefits = [], exclusions = [], waiting = [], preex = [];
    var hasMatch = false;

    plan.entries.forEach(function(entry) {
      var text = entry.text.toLowerCase();
      var cat = entry.category.toLowerCase();
      var matched = false;
      for (var i = 0; i < searchTerms.length; i++) {
        if (text.includes(searchTerms[i]) || cat.includes(searchTerms[i])) { matched = true; break; }
      }
      if (!matched) return;
      hasMatch = true;

      if (cat.includes('exclusion') || cat.includes('limitation')) exclusions.push(entry.text);
      else if (cat.includes('waiting')) waiting.push(entry.text);
      else if (cat.includes('pre-existing')) preex.push(entry.text);
      else benefits.push(entry.text);
    });

    if (hasMatch) {
      matchedPlans.push({ name: plan.name, benefits: benefits, exclusions: exclusions, waiting: waiting, preex: preex });
      allBenefits = allBenefits.concat(benefits);
      allExclusions = allExclusions.concat(exclusions);
      allWaiting = allWaiting.concat(waiting);
      allPreex = allPreex.concat(preex);
    }
  });

  var totalMatches = allBenefits.length + allExclusions.length + allWaiting.length + allPreex.length;

  // Determine coverage status and source
  var status, internalAnswer, rebuttalType, sourceType;

  if (totalMatches === 0) {
    // No dashboard match → not in the plan = not covered
    status = 'Not Covered';
    internalAnswer = '"' + query + '" is not listed in the Schedule of Benefits for this plan. If it\'s not listed, it\'s not covered.';
    rebuttalType = 'notCovered';
    sourceType = 'Dashboard';
  } else if (allBenefits.length > 0 && allExclusions.length === 0) {
    status = 'Covered';
    internalAnswer = allBenefits.slice(0, 3).join(' | ');
    rebuttalType = allWaiting.length ? 'waiting' : allPreex.length ? 'preex' : 'covered';
    sourceType = 'Dashboard';
  } else if (allExclusions.length > 0 && allBenefits.length === 0) {
    status = 'Not Covered';
    internalAnswer = allExclusions.slice(0, 3).join(' | ');
    rebuttalType = 'notCovered';
    sourceType = 'Dashboard';
  } else if (allBenefits.length > 0 && allExclusions.length > 0) {
    // Check if exclusions clearly say NOT/NO covered
    var clearNoExclusions = allExclusions.filter(function(e) { return /\bNO\b|\bNOT\b|\bnot cover|\bno cover/i.test(e); });
    var clearNo = clearNoExclusions.length > 0;
    if (clearNo && allBenefits.length <= 2) {
      // Few benefits + clear exclusion → Not Covered (e.g. "NO mental health" with tangential matches)
      status = 'Not Covered';
      internalAnswer = clearNoExclusions[0] + (allBenefits.length ? ' (Note: ' + allBenefits[0] + ')' : '');
      rebuttalType = 'notCovered';
    } else if (clearNo && allBenefits.length > 2) {
      // Many benefits + some qualified exclusions → Covered with limitation note
      status = 'Covered';
      internalAnswer = allBenefits[0] + ' — Note: ' + clearNoExclusions[0];
      rebuttalType = 'partial';
    } else {
      status = 'Covered';
      internalAnswer = 'Benefit: ' + allBenefits[0] + ' — BUT: ' + allExclusions[0];
      rebuttalType = 'partial';
    }
    sourceType = 'Dashboard';
  } else if (allWaiting.length > 0 || allPreex.length > 0) {
    status = 'Covered';
    internalAnswer = (allWaiting[0] || '') + (allPreex.length ? ' | Pre-ex: ' + allPreex[0] : '');
    rebuttalType = allPreex.length ? 'preex' : 'waiting';
    sourceType = 'Dashboard';
  } else {
    status = 'Not Covered';
    internalAnswer = 'No clear benefit found for "' + query + '" in this plan.';
    rebuttalType = 'notCovered';
    sourceType = 'Dashboard';
  }

  var rebuttal = pickRebuttal(rebuttalType);

  // Build structured HTML output
  var statusColor = status === 'Covered' ? '#15803D' : status === 'Not Covered' ? '#DC2626' : '#D97706';
  var statusBg = status === 'Covered' ? '#E3F6ED' : status === 'Not Covered' ? 'rgba(220,38,38,0.06)' : '#FFFBEB';
  var statusBorder = status === 'Covered' ? '#C6F0D8' : status === 'Not Covered' ? 'rgba(220,38,38,0.15)' : '#FEF3C7';
  var statusIcon = status === 'Covered' ? LI.check : status === 'Not Covered' ? LI.ban : LI.warn;
  var sourceIcon = sourceType === 'Dashboard' ? LI.clipboard : LI.brain;

  var html = '<div style="border-radius:12px;overflow:hidden;border:1.5px solid ' + statusBorder + ';">';

  // Status bar
  html += '<div style="background:' + statusBg + ';padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid ' + statusBorder + ';">';
  html += '<div style="display:flex;align-items:center;gap:6px;"><span style="font-size:14px;">' + statusIcon + '</span><span style="font-size:13px;font-weight:800;color:' + statusColor + ';">' + status.toUpperCase() + '</span></div>';
  html += '<span style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:99px;background:' + statusColor + ';color:#fff;">' + sourceIcon + ' ' + sourceType + '</span>';
  html += '</div>';

  // Internal answer
  html += '<div style="padding:10px 14px;background:#F8FAFF;border-bottom:1px solid #E8EBF5;">';
  html += '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#6B7280;margin-bottom:4px;">Internal Answer</div>';
  html += '<div style="font-size:12.5px;color:#1C2035;line-height:1.55;">' + brHl(internalAnswer, specificTerms) + '</div>';
  html += '</div>';

  // Client rebuttal
  html += '<div style="padding:10px 14px;background:#F8FAFF;">';
  html += '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#6B7280;margin-bottom:4px;">' + LI.mic + ' Say This to Client</div>';
  html += '<div style="font-size:12.5px;color:#1C2035;line-height:1.55;font-style:italic;">"' + rebuttal + '"</div>';
  html += '</div>';

  html += '</div>';

  // If multiple plans matched, show per-plan detail below
  if (matchedPlans.length > 1) {
    html += '<div style="margin-top:8px;font-size:10px;color:#9A8F7E;">' + matchedPlans.length + ' plans matched — showing combined result</div>';
  }
  if (matchedPlans.length === 1 && plans.length > 1) {
    html += '<div style="margin-top:6px;font-size:10px;color:#9A8F7E;">Found in: <strong>' + matchedPlans[0].name + '</strong></div>';
  }

  // Expandable detail (keep existing deep analysis available)
  if (totalMatches > 0) {
    html += '<details style="margin-top:8px;"><summary style="font-size:11px;color:#5175F1;cursor:pointer;font-weight:600;">View full benefit details (' + totalMatches + ' matches)</summary>';
    html += '<div style="margin-top:6px;">';
    matchedPlans.forEach(function(pm) {
      html += '<div style="font-size:11px;font-weight:700;color:#1C2035;margin:6px 0 4px;">' + pm.name + '</div>';
      pm.benefits.forEach(function(b) { html += '<div style="font-size:11px;color:#15803D;padding-left:8px;margin-bottom:2px;">' + LI.check + ' ' + brHl(b, specificTerms) + '</div>'; });
      pm.exclusions.forEach(function(e) { html += '<div style="font-size:11px;color:#DC2626;padding-left:8px;margin-bottom:2px;">' + LI.ban + ' ' + brHl(e, specificTerms) + '</div>'; });
      pm.waiting.forEach(function(w) { html += '<div style="font-size:11px;color:#C2410C;padding-left:8px;margin-bottom:2px;">' + LI.clock + ' ' + brHl(w, specificTerms) + '</div>'; });
      pm.preex.forEach(function(p) { html += '<div style="font-size:11px;color:#C2410C;padding-left:8px;margin-bottom:2px;">' + LI.warn + ' ' + brHl(p, specificTerms) + '</div>'; });
    });
    html += '</div></details>';
  }

  return html;
}

// Legacy function — still available via "Ask AI" buttons in old results
function brAskAI(query) {
  var plansToUse = brSearchAllPlans ? BR_PLANS : (brActivePlan ? [brActivePlan] : []);
  var answer = brSmartAnswer(query, plansToUse);
  brAddMsg('ai', answer);
}

// Broad category terms that should NOT be used alone for matching in Smart Analysis
// These cause false positives (e.g. "diagnostic" matching "preventive health services")
var BROAD_CATEGORY_TERMS = ['diagnostic','imaging','screening','preventive','outpatient','inpatient',
  'ambulatory','pathology','surgical','medical','health','care','service','services','treatment',
  'benefit','benefits','covered','coverage','plan','visit'];

function getSpecificTerms(query) {
  var q = query.toLowerCase().trim();
  var specific = [q];
  // Only add DIRECT synonyms from the map (first-level lookup), not fuzzy matches
  if (SEARCH_SYNONYMS[q]) {
    SEARCH_SYNONYMS[q].forEach(function(s) {
      if (BROAD_CATEGORY_TERMS.indexOf(s) === -1) specific.push(s);
    });
  }
  // Also check for multi-word queries where each word might be a key
  var words = q.split(/\s+/);
  words.forEach(function(w) {
    if (w.length > 2 && SEARCH_SYNONYMS[w]) {
      SEARCH_SYNONYMS[w].forEach(function(s) {
        if (BROAD_CATEGORY_TERMS.indexOf(s) === -1 && specific.indexOf(s) === -1) specific.push(s);
      });
    }
  });
  var unique = [];
  specific.forEach(function(t) { if (unique.indexOf(t) === -1) unique.push(t); });
  return unique;
}

function brSmartAnswer(query, plans) {
  var q = query.toLowerCase().trim();
  var expandedTerms = expandSearchSynonyms(q);
  var specificTerms = getSpecificTerms(q); // Only specific, non-broad terms for matching

  // Detect question type
  var isCovered = /cover|include|have|offer|provide|get|eligible|does it|is .+ covered|can i/i.test(q);
  var isNotCovered = /not cover|exclud|exclu|what.+not|isn.t cover|doesn.t cover|no coverage/i.test(q);
  var isCopay = /copay|co-pay|cost|how much|price|pay|charge|fee/i.test(q);
  var isWaiting = /wait|waiting period|when .+ start|how long|day 1|effective/i.test(q);
  var isPreEx = /pre-existing|preexisting|pre ex|prior condition|existing condition/i.test(q);

  var html = '<div style="background:#F8FAFF;border:1px solid #E8EBF5;border-left:3px solid #5175F1;border-radius:8px;padding:12px;">';
  html += '<div style="font-size:10px;font-weight:800;color:#5175F1;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">' + LI.brain + ' Smart Analysis</div>';

  var foundAnything = false;

  plans.forEach(function(plan) {
    var planMatches = {benefits:[], exclusions:[], waiting:[], preex:[], notes:[]};
    var hasDirectMatch = false; // Track if ANY specific term actually matched

    plan.entries.forEach(function(entry) {
      var text = entry.text.toLowerCase();
      var cat = entry.category.toLowerCase();

      // STRICT matching: only use specific terms, not broad category terms
      var matched = false;
      for (var i=0; i<specificTerms.length; i++) {
        if (text.includes(specificTerms[i]) || cat.includes(specificTerms[i])) { matched=true; hasDirectMatch=true; break; }
      }
      if (!matched) return;

      if (cat.includes('exclusion') || cat.includes('limitation')) planMatches.exclusions.push(entry.text);
      else if (cat.includes('waiting')) planMatches.waiting.push(entry.text);
      else if (cat.includes('pre-existing')) planMatches.preex.push(entry.text);
      else if (cat.includes('agent note')) planMatches.notes.push(entry.text);
      else planMatches.benefits.push(entry.text);
    });

    var hasResults = planMatches.benefits.length || planMatches.exclusions.length || planMatches.waiting.length || planMatches.preex.length;
    if (!hasResults) return;
    foundAnything = true;

    html += '<div style="margin-bottom:10px;">';
    html += '<div style="font-size:12px;font-weight:800;color:#1C2035;margin-bottom:6px;">' + LI.file + ' ' + plan.name + '</div>';

    if (planMatches.benefits.length) {
      html += '<div style="background:#FFFFFF;border:1px solid #E8EBF5;border-left:3px solid #29A26A;border-radius:8px;padding:8px 10px;margin-bottom:5px;">';
      html += '<div style="font-size:10px;font-weight:800;color:#15803D;margin-bottom:4px;">' + LI.check + ' COVERED</div>';
      planMatches.benefits.forEach(function(b) {
        html += '<div style="font-size:12px;color:#1C2035;margin-bottom:3px;padding-left:8px;border-left:2px solid #29A26A;">' + LI.dot + ' ' + brHl(b, specificTerms) + '</div>';
      });
      html += '</div>';
    }

    if (planMatches.exclusions.length) {
      html += '<div style="background:#FFFFFF;border:1px solid #E8EBF5;border-left:3px solid #DC2626;border-radius:8px;padding:8px 10px;margin-bottom:5px;">';
      html += '<div style="font-size:10px;font-weight:800;color:#DC2626;margin-bottom:4px;">' + LI.ban + ' NOT COVERED / LIMITED</div>';
      planMatches.exclusions.forEach(function(e) {
        html += '<div style="font-size:12px;color:#1C2035;margin-bottom:3px;padding-left:8px;border-left:2px solid #DC2626;">' + LI.dot + ' ' + brHl(e, specificTerms) + '</div>';
      });
      html += '</div>';
    }

    if (isWaiting && planMatches.waiting.length) {
      html += '<div style="background:#FFFFFF;border:1px solid #E8EBF5;border-left:3px solid #F59E0B;border-radius:8px;padding:8px 10px;margin-bottom:5px;">';
      html += '<div style="font-size:10px;font-weight:800;color:#C2410C;margin-bottom:4px;">' + LI.clock + ' WAITING PERIODS</div>';
      planMatches.waiting.forEach(function(w) { html += '<div style="font-size:12px;color:#1C2035;margin-bottom:3px;">' + LI.dot + ' ' + brHl(w, specificTerms) + '</div>'; });
      html += '</div>';
    }

    if (isPreEx && planMatches.preex.length) {
      html += '<div style="background:#FFFFFF;border:1px solid #E8EBF5;border-left:3px solid #F59E0B;border-radius:8px;padding:8px 10px;margin-bottom:5px;">';
      html += '<div style="font-size:10px;font-weight:800;color:#C2410C;margin-bottom:4px;">' + LI.warn + ' PRE-EXISTING CONDITIONS</div>';
      planMatches.preex.forEach(function(p) { html += '<div style="font-size:12px;color:#1C2035;margin-bottom:3px;">' + LI.dot + ' ' + brHl(p, specificTerms) + '</div>'; });
      html += '</div>';
    }

    // Smart verdict — only give definitive COVERED if specific terms matched benefit entries
    if (!planMatches.benefits.length && planMatches.exclusions.length && isCovered) {
      html += '<div style="font-size:11px;color:#DC2626;font-weight:700;margin-top:4px;">' + LI.warn + ' This does not appear to be covered under ' + plan.name + '</div>';
    } else if (planMatches.benefits.length && !planMatches.exclusions.length && isCovered) {
      html += '<div style="font-size:11px;color:#15803D;font-weight:700;margin-top:4px;">' + LI.check + ' Yes, this appears to be covered under ' + plan.name + '</div>';
    } else if (planMatches.benefits.length && planMatches.exclusions.length && isCovered) {
      html += '<div style="font-size:11px;color:#D97706;font-weight:700;margin-top:4px;">' + LI.warn + ' Partial coverage — see benefits AND exclusions above for ' + plan.name + '</div>';
    }
    html += '<div style="font-size:10px;color:#6B7280;font-style:italic;margin-top:6px;padding-top:4px;border-top:1px dashed rgba(0,0,0,0.08);">⚠️ Always verify against the full Schedule of Benefits before confirming coverage to the prospect.</div>';

    html += '</div>';
  });

  if (!foundAnything) {
    html += '<div style="font-size:12px;color:#6B7280;line-height:1.6;">';
    html += '<div style="background:#FFFFFF;border:1px solid #E8EBF5;border-left:3px solid #DC2626;border-radius:8px;padding:10px;margin-bottom:8px;">';
    html += '<div style="font-size:10px;font-weight:800;color:#DC2626;margin-bottom:4px;">' + LI.ban + ' NOT SPECIFICALLY LISTED</div>';
    html += '<strong>"' + query.replace(/</g,'&lt;') + '"</strong> is not specifically listed in the Schedule of Benefits.</div>';
    html += '<div style="font-size:11px;color:#6B7280;line-height:1.6;">';
    html += LI.dot + ' Plans state: <em>"does not cover any service NOT listed in Schedule of Benefits"</em><br>';
    html += LI.dot + ' If the member needs this service, check if it falls under a broader covered category<br>';
    html += LI.dot + ' Try broader terms: hospital, outpatient, surgery, office visit<br>';
    html += LI.dot + ' Tap "All Plans" to compare across every plan';
    html += '</div></div>';
  }

  if (specificTerms.length > 1) {
    html += '<div style="font-size:10px;color:#9CA3AF;margin-top:6px;border-top:1px solid rgba(0,0,0,0.06);padding-top:6px;">Searched: ' + specificTerms.slice(0,8).join(', ') + (specificTerms.length>8 ? ' + more' : '') + '</div>';
  }

  html += '</div>';
  return html;
}

function brHl(text, terms) {
  var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  terms.forEach(function(term) {
    if (term.length < 2) return;
    var re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    safe = safe.replace(re, '<mark style="background:#FFF3CD;padding:0 2px;border-radius:2px;font-weight:700">$1</mark>');
  });
  return safe;
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function(){ buildSearchIndex(); brInit(); });
} else {
  setTimeout(function(){ buildSearchIndex(); brInit(); }, 0);
}
</script>

<script>
/* ── Click-Outside-to-Close System ──────────────────────────
   Reusable: add entries to CLOSEABLE to handle future components.
   Each entry: { el, isOpen, close, ignore }
     el      — selector string for the panel/overlay
     isOpen  — function returning true when the component is visible
     close   — function that closes the component
     ignore  — array of selectors whose clicks should NOT close it
*/
(function() {
  var CLOSEABLE = [
    {
      el: '.sidebar',
      isOpen: function(e) { return e.classList.contains('open'); },
      close:  function(e) { e.classList.remove('open'); },
      ignore: ['#mobMenu']
    },
    {
      el: '#srOverlay',
      isOpen: function(e) { return e.classList.contains('show'); },
      close:  function()  { if (typeof closeSearch === 'function') closeSearch(); },
      ignore: ['.sw', '#scBtn']
    },
    {
      el: '#br-panel',
      isOpen: function(e) { return e.classList.contains('open'); },
      close:  function() {
        brOpen = false;
        document.getElementById('br-panel').classList.remove('open');
        document.getElementById('br-toggle').classList.remove('open');
      },
      ignore: ['#br-toggle']
    },
    {
      el: '#liveResult',
      isOpen: function(e) { return e.classList.contains('show'); },
      close:  function(e) { e.classList.remove('show'); },
      ignore: []
    }
  ];

  document.addEventListener('click', function(event) {
    CLOSEABLE.forEach(function(cfg) {
      var panel = document.querySelector(cfg.el);
      if (!panel || !cfg.isOpen(panel)) return;

      // Click is inside the panel — do nothing
      if (panel.contains(event.target)) return;

      // Click is on a trigger/ignore element — do nothing
      var ignored = false;
      cfg.ignore.forEach(function(sel) {
        var ig = document.querySelector(sel);
        if (ig && ig.contains(event.target)) ignored = true;
      });
      if (ignored) return;

      // Click is outside — close it
      cfg.close(panel);
    });
  });
})();
</script>
